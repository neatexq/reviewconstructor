<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Лента — Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bor:#252530;--acc:#c8a96e;--txt:#e8e0d0;--txt2:#5a5060;--green:#22c55e;--red:#ef4444;--blue:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Mono',monospace;background:var(--bg);color:var(--txt);min-height:100vh}
a{text-decoration:none;color:inherit}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bor);height:54px;display:flex;align-items:center;padding:0 20px;gap:16px}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--acc);margin-right:8px}
.nav-link{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--txt2);padding:5px 10px;border-radius:6px;transition:all .2s;text-transform:uppercase}
.nav-link:hover,.nav-link.active{color:var(--acc);background:rgba(200,169,110,.08)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-nick{font-size:10px;color:var(--acc);letter-spacing:1px}
.nav-btn{padding:5px 14px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:1px;border:1px solid var(--bor);background:var(--bg2);color:var(--txt2);transition:all .2s}
.nav-btn:hover{border-color:var(--acc);color:var(--acc)}
.nav-btn.primary{background:var(--acc);border-color:var(--acc);color:#1a1005}

/* LAYOUT */
.wrap{max-width:680px;margin:0 auto;padding:28px 16px 60px}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;border:1px solid var(--bor);background:var(--bg2);color:var(--txt2);transition:all .2s;font-family:'Space Mono',monospace}
.filter-btn:hover{border-color:var(--acc);color:var(--acc)}
.filter-btn.active{background:var(--acc);border-color:var(--acc);color:#1a1005}

/* REVIEW POST */
.post{background:var(--bg2);border:1px solid var(--bor);border-radius:14px;overflow:hidden;margin-bottom:16px;transition:border-color .2s;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.post:hover{border-color:rgba(200,169,110,.2)}
.post-head{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.post-av{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:2px solid var(--bor);object-fit:cover;flex-shrink:0;cursor:pointer;transition:border-color .2s}
.post-av:hover{border-color:var(--acc)}
.post-meta{flex:1;min-width:0}
.post-nick{font-size:11px;font-weight:700;color:#ddd;cursor:pointer}
.post-nick:hover{color:var(--acc)}
.post-time{font-size:9px;color:var(--txt2);letter-spacing:.5px;margin-top:1px}
.post-type{font-size:9px;color:var(--acc);letter-spacing:1.5px;text-transform:uppercase}
.post-add-btn{padding:4px 12px;border-radius:20px;font-size:9px;font-weight:700;border:1px solid var(--bor);background:transparent;color:var(--txt2);cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;white-space:nowrap}
.post-add-btn:hover{border-color:var(--green);color:var(--green)}
.post-add-btn.sent{color:var(--txt2);border-color:var(--bor);cursor:default}

/* IMAGE */
.post-img-wrap{position:relative;cursor:pointer;overflow:hidden}
.post-img{width:100%;display:block;max-height:600px;object-fit:contain;background:var(--bg3);transition:transform .3s}
.post-img-wrap:hover .post-img{transform:scale(1.01)}
.post-view-tl-btn{position:absolute;bottom:10px;right:10px;padding:6px 14px;background:rgba(10,10,15,.85);border:1px solid rgba(200,169,110,.5);border-radius:7px;color:#c8a96e;font-size:10px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:1px;backdrop-filter:blur(8px);transition:all .2s;z-index:2}
.post-view-tl-btn:hover{background:rgba(200,169,110,.15)}
.post-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 60%,rgba(0,0,0,.6));opacity:0;transition:opacity .3s}
.post-img-wrap:hover .post-view-tl-btn{position:absolute;bottom:10px;right:10px;padding:6px 14px;background:rgba(10,10,15,.85);border:1px solid rgba(200,169,110,.5);border-radius:7px;color:#c8a96e;font-size:10px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:1px;backdrop-filter:blur(8px);transition:all .2s;z-index:2}
.post-view-tl-btn:hover{background:rgba(200,169,110,.15)}
.post-img-overlay{opacity:1}

/* ACTIONS */
.post-actions{padding:10px 16px;display:flex;align-items:center;gap:4px;border-top:1px solid rgba(255,255,255,.04)}
.action-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;color:var(--txt2);transition:all .2s}
.action-btn:hover{background:var(--bg3);color:var(--txt)}
.action-btn.liked{color:#ef6c9a}
.action-btn .ico{font-size:15px;line-height:1}
.post-title{padding:0 16px 4px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:#ddd}

/* COMMENTS */
.comments-wrap{border-top:1px solid rgba(255,255,255,.04);padding:0}
.comments-list{max-height:280px;overflow-y:auto;padding:10px 16px 0}
.comment{display:flex;gap:8px;margin-bottom:10px;animation:fadeUp .2s ease}
.comment-av{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--bor);object-fit:cover;flex-shrink:0;cursor:pointer}
.comment-body{flex:1;background:var(--bg3);border-radius:8px;padding:7px 10px}
.comment-nick{font-size:9px;font-weight:700;color:var(--acc);letter-spacing:.5px;cursor:pointer}
.comment-nick:hover{text-decoration:underline}
.comment-text{font-size:11px;color:#ccc;margin-top:2px;line-height:1.5;word-break:break-word}
.comment-time{font-size:8px;color:var(--txt2);margin-top:3px}
.comment-input-row{display:flex;gap:8px;padding:10px 16px 12px;align-items:center}
.comment-av-self{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--bor);object-fit:cover;flex-shrink:0}
.comment-in{flex:1;background:var(--bg);border:1px solid var(--bor);border-radius:20px;padding:7px 14px;font-size:11px;color:var(--txt);font-family:'Space Mono',monospace;outline:none;transition:border-color .2s}
.comment-in:focus{border-color:var(--acc)}
.comment-send{width:30px;height:30px;border-radius:50%;background:var(--acc);border:none;cursor:pointer;font-size:13px;flex-shrink:0;transition:opacity .2s}
.comment-send:hover{opacity:.8}

/* EMPTY / LOADING */
.feed-loading{text-align:center;padding:60px 20px;color:var(--txt2);font-size:11px;letter-spacing:2px}
.feed-empty{text-align:center;padding:60px 20px;color:var(--txt2)}
.feed-empty span{font-size:40px;display:block;margin-bottom:12px;opacity:.3}

/* LIGHTBOX */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lb-overlay.show{display:flex}
.lb-img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;box-shadow:0 0 80px rgba(0,0,0,.8)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg2);border:1px solid var(--bor);border-radius:10px;padding:10px 18px;font-size:11px;color:var(--txt);z-index:400;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

@media(max-width:600px){
  .nav-link{display:none}.nav-link.mobile-show{display:block}
  .wrap{padding:16px 10px 80px}
}
</style>
<script src="nav.js"></script>
<style>
/* Hide old nav - replaced by rc-nav */
body>.nav:not(#rcNav), body>nav:not(#rcNav) { display:none !important; }
</style>
</head>
<body>
<script>document.addEventListener("DOMContentLoaded",function(){if(typeof initNav!=="undefined")initNav("feed")});</script>


<nav class="nav">
  <a href="index.html" class="nav-logo">◈</a>
  <a href="feed.html" class="nav-link active mobile-show">Лента</a>
  <a href="index.html" class="nav-link">Создать</a>
  <a href="profile.html" class="nav-link">Профиль</a>
  <a href="messages.html" class="nav-link" id="navMsgs">Сообщения</a>
  <div class="nav-right">
    <span class="nav-nick" id="navNick" style="display:none"></span>
    <a href="profile.html" class="nav-btn primary" id="navAuthBtn">Войти</a>
  </div>
</nav>

<div class="wrap">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')">Все</button>
    <button class="filter-btn" onclick="setFilter('🎬 Кино')">🎬 Кино</button>
    <button class="filter-btn" onclick="setFilter('🎵 Музыка')">🎵 Музыка</button>
    <button class="filter-btn" onclick="setFilter('🎮 Игры')">🎮 Игры</button>
    <button class="filter-btn" onclick="setFilter('📚 Книги')">📚 Книги</button>
    <button class="filter-btn" onclick="setFilter('🎌 Аниме')">🎌 Аниме</button>
    <button class="filter-btn" onclick="setFilter('🏆 Тирлист')">🏆 Тирлисты</button>
  </div>
  <div id="feedWrap"><div class="feed-loading">Загрузка...</div></div>
</div>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lbOverlay" onclick="if(event.target===this||event.target.id==='lbClose')closeLb()">
  <div id="lbClose" style="position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:#18181f;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:14px;color:#aaa;cursor:pointer;z-index:1">✕</div>
  <div id="lbWrap" style="position:relative;overflow:hidden;max-width:95vw;max-height:95vh;cursor:zoom-in;user-select:none">
    <img class="lb-img" id="lbImg" src="" alt="" style="transition:transform .15s;transform-origin:center center;pointer-events:none">
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, get, set, push, update, remove, onValue, query, orderByChild, limitToLast, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyANeIRqb_oUJSUq2PsU1xGzOJKV29QOY74",
  authDomain: "reviewconstructor-8d391.firebaseapp.com",
  databaseURL: "https://reviewconstructor-8d391-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "reviewconstructor-8d391",
  storageBucket: "reviewconstructor-8d391.firebasestorage.app",
  messagingSenderId: "722321589337",
  appId: "1:722321589337:web:81098aec4a3d9e9db21d48"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const session = JSON.parse(localStorage.getItem('rc_session')||'null');
let currentUser = session;
let currentFilter = 'all';
let allPosts = [];
let friendsSet = new Set();

// NAV
if(currentUser){
  document.getElementById('navNick').textContent='@'+currentUser.nick;
  document.getElementById('navNick').style.display='block';
  document.getElementById('navAuthBtn').textContent='@'+currentUser.nick;
  loadFriends();
} else {
  document.getElementById('navMsgs').style.display='none';
}

async function loadFriends(){
  if(!currentUser)return;
  const snap = await get(ref(db,`friends/${currentUser.uid}`));
  if(snap.exists()) Object.keys(snap.val()).forEach(uid=>friendsSet.add(uid));
}

// ── FILTER ──
window.setFilter = function(f){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim()===f || (f==='all' && b.textContent.trim()==='Все'));
  });
  renderFeed();
}

// ── LOAD FEED ──
async function loadFeed(){
  const wrap = document.getElementById('feedWrap');
  // Get all users
  const usersSnap = await get(ref(db,'users'));
  if(!usersSnap.exists()){ wrap.innerHTML='<div class="feed-empty"><span>📭</span>Пока нет рецензий</div>'; return; }
  const users = usersSnap.val();
  allPosts = [];
  // For each user get their public reviews
  for(const [uid, user] of Object.entries(users)){
    const rvSnap = await get(ref(db,`reviews/${uid}`));
    if(!rvSnap.exists()) continue;
    Object.entries(rvSnap.val()).forEach(([id,rv])=>{
      if(rv.privacy === 'public'){
        allPosts.push({...rv, id, authorUid:uid, authorNick:user.nick, authorAv:user.avatarUrl||''});
      }
    });
  }
  // Sort by date
  allPosts.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  renderFeed();
  // Real-time: watch for new reviews
  onValue(ref(db,'reviews'), ()=>{ /* lightweight re-check */ });
}

function renderFeed(){
  const wrap = document.getElementById('feedWrap');
  const posts = currentFilter==='all' ? allPosts : allPosts.filter(p=>p.type===currentFilter);
  if(!posts.length){
    wrap.innerHTML='<div class="feed-empty"><span>🔍</span>Нет рецензий в этой категории</div>';
    return;
  }
  wrap.innerHTML='';
  posts.forEach((post,i)=>{
    const el = buildPost(post,i);
    wrap.appendChild(el);
    // load likes/comments count async
    loadPostMeta(post, el);
  });
}

const PLACEHOLDER = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='14' r='8' fill='%23333'/%3E%3Ccircle cx='18' cy='34' r='12' fill='%23333'/%3E%3C/svg%3E`;

function buildPost(post, idx){
  const div = document.createElement('div');
  div.className='post';
  div.id=`post_${post.id}`;
  div.style.animationDelay = (idx*0.04)+'s';
  const timeAgo = getTimeAgo(post.createdAt);
  const isOwn = currentUser && post.authorUid === currentUser.uid;
  const isFriend = friendsSet.has(post.authorUid);
  const profileUrl = `user.html?u=${encodeURIComponent(post.authorNick)}`;
  div.innerHTML=`
    <div class="post-head">
      <img class="post-av" src="${post.authorAv||PLACEHOLDER}" alt="" onclick="window.location='${profileUrl}'" onerror="this.src='${PLACEHOLDER}'">
      <div class="post-meta">
        <div class="post-nick" onclick="window.location='${profileUrl}'">@${post.authorNick}</div>
        <div class="post-time">${timeAgo}</div>
      </div>
      <div class="post-type">${post.type||''}</div>
      ${!isOwn && !isFriend ? `<button class="post-add-btn" id="addbtn_${post.authorUid}" onclick="addFriend('${post.authorUid}','${post.authorNick}',this)">+ Добавить</button>` : ''}
    </div>
    ${post.title?`<div class="post-title">${post.title}</div>`:''}
    <div class="post-img-wrap" onclick="openLb('${post.id}')">
      <img class="post-img" id="img_${post.id}" src="${post.imgData||''}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div class="post-img-overlay"></div>
      ${post.isTierlist||post.tiersData?`<button class="post-view-tl-btn" onclick="event.stopPropagation();openFeedTierlist(this)" data-rv='${JSON.stringify({id:post.id,title:post.title,type:post.type||'',date:post.date||'',authorNick:post.authorNick||'',tiersData:post.tiersData,poolData:post.poolData,reviewLinks:post.reviewLinks}).replace(/'/g,"&#39;").replace(/"/g,"&quot;")}'>👁 Смотреть</button>`:''}
    </div>
    <div class="post-actions">
      <button class="action-btn" id="like_${post.id}" onclick="toggleLike('${post.id}','${post.authorUid}')">
        <span class="ico">🤍</span><span id="likeCount_${post.id}">0</span>
      </button>
      <button class="action-btn" onclick="toggleComments('${post.id}')">
        <span class="ico">💬</span><span id="cmtCount_${post.id}">0</span>
      </button>
      <button class="action-btn" onclick="sharePost('${post.authorNick}','${post.title||''}')" style="margin-left:auto">
        <span class="ico">↗</span>
      </button>
    </div>
    <div class="comments-wrap" id="cmts_${post.id}" style="display:none">
      <div class="comments-list" id="cmtList_${post.id}"></div>
      <div class="comment-input-row">
        <img class="comment-av-self" src="${currentUser?.avatarUrl||PLACEHOLDER}" onerror="this.src='${PLACEHOLDER}'" alt="">
        <input class="comment-in" id="cmtIn_${post.id}" placeholder="${currentUser?'Написать комментарий...':'Войди чтобы комментировать'}" ${!currentUser?'disabled':''} maxlength="300"
          onkeydown="if(event.key==='Enter')sendComment('${post.id}','${post.authorUid}')">
        <button class="comment-send" onclick="sendComment('${post.id}','${post.authorUid}')">➤</button>
      </div>
    </div>`;
  return div;
}

async function loadPostMeta(post, el){
  // Likes
  onValue(ref(db,`likes/${post.id}`), snap=>{
    const count = snap.exists() ? Object.keys(snap.val()).length : 0;
    const likeEl = document.getElementById(`likeCount_${post.id}`);
    if(likeEl) likeEl.textContent = count;
    const likeBtn = document.getElementById(`like_${post.id}`);
    if(likeBtn && currentUser && snap.exists() && snap.val()[currentUser.uid]){
      likeBtn.classList.add('liked');
      likeBtn.querySelector('.ico').textContent='❤️';
    }
  });
  // Comments count
  onValue(ref(db,`comments/${post.id}`), snap=>{
    const count = snap.exists() ? Object.keys(snap.val()).length : 0;
    const el = document.getElementById(`cmtCount_${post.id}`);
    if(el) el.textContent = count;
  });
}

// ── LIKES ──
window.toggleLike = async function(postId, authorUid){
  if(!currentUser){ toast('Войди чтобы ставить лайки','err'); return; }
  const likeRef = ref(db,`likes/${postId}/${currentUser.uid}`);
  const snap = await get(likeRef);
  const btn = document.getElementById(`like_${postId}`);
  if(snap.exists()){
    await remove(likeRef);
    if(btn){btn.classList.remove('liked');btn.querySelector('.ico').textContent='🤍';}
  } else {
    await set(likeRef,{nick:currentUser.nick,at:Date.now()});
    if(btn){btn.classList.add('liked');btn.querySelector('.ico').textContent='❤️';}
    // notify author
    if(authorUid !== currentUser.uid)
      await push(ref(db,`notifications/${authorUid}`),{text:`@${currentUser.nick} лайкнул(а) твою рецензию ❤️`,at:Date.now()});
  }
}

// ── COMMENTS ──
window.toggleComments = function(postId){
  const wrap = document.getElementById(`cmts_${postId}`);
  if(!wrap)return;
  const shown = wrap.style.display !== 'none';
  wrap.style.display = shown ? 'none' : 'block';
  if(!shown) loadComments(postId);
}

function loadComments(postId){
  const list = document.getElementById(`cmtList_${postId}`);
  if(!list)return;
  onValue(ref(db,`comments/${postId}`), snap=>{
    list.innerHTML='';
    if(!snap.exists()){list.innerHTML='<div style="font-size:10px;color:var(--txt2);padding:4px 0 8px">Пока нет комментариев</div>';return;}
    const cmts = Object.entries(snap.val()).sort((a,b)=>a[1].at-b[1].at);
    cmts.forEach(([id,c])=>{
      const d=document.createElement('div');d.className='comment';
      const av=c.avatarUrl||PLACEHOLDER;
      const profileUrl=`user.html?u=${encodeURIComponent(c.nick)}`;
      d.innerHTML=`<img class="comment-av" src="${av}" onerror="this.src='${PLACEHOLDER}'" onclick="window.location='${profileUrl}'">
        <div class="comment-body">
          <div class="comment-nick" onclick="window.location='${profileUrl}'">@${c.nick}</div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
          <div class="comment-time">${getTimeAgo(c.at)}</div>
        </div>`;
      list.appendChild(d);
    });
    list.scrollTop=list.scrollHeight;
  });
}

window.sendComment = async function(postId, authorUid){
  if(!currentUser){ toast('Войди чтобы комментировать','err'); return; }
  const input = document.getElementById(`cmtIn_${postId}`);
  const text = input?.value.trim(); if(!text)return;
  input.value='';
  await push(ref(db,`comments/${postId}`),{
    nick:currentUser.nick, avatarUrl:currentUser.avatarUrl||'', text, at:Date.now()
  });
  if(authorUid !== currentUser.uid)
    await push(ref(db,`notifications/${authorUid}`),{text:`@${currentUser.nick} прокомментировал(а) твою рецензию 💬`,at:Date.now()});
}

// ── ADD FRIEND ──
window.addFriend = async function(uid, nick, btn){
  if(!currentUser){ toast('Войди чтобы добавлять друзей','err'); return; }
  const snap = await get(ref(db,`friend_requests/${uid}/${currentUser.uid}`));
  if(snap.exists()){ toast('Запрос уже отправлен',''); return; }
  await set(ref(db,`friend_requests/${uid}/${currentUser.uid}`),{
    fromUid:currentUser.uid, fromNick:currentUser.nick, sentAt:Date.now()
  });
  btn.textContent='✓ Отправлено';
  btn.classList.add('sent');
  btn.disabled=true;
  toast('Запрос отправлен @'+nick,'ok');
}

// ── SHARE ──
window.sharePost = function(nick, title){
  const url = `${location.origin}${location.pathname.replace('feed.html','')}user.html?u=${encodeURIComponent(nick)}`;

// ── LIGHTBOX ──
window.openLb = function(id){
  const imgEl = document.getElementById('img_'+id);
  if(!imgEl||!imgEl.src) return;
  const img = document.getElementById('lbImg');
  const wrap = document.getElementById('lbWrap');
  img.src = imgEl.src;
  document.getElementById('lbOverlay').classList.add('show');
  let zoom=1, tx=0, ty=0, dragging=false, sx=0, sy=0, stx=0, sty=0;
  img.style.transform='scale(1) translate(0,0)';
  function apply(){ img.style.transform='scale('+zoom+') translate('+tx+'px,'+ty+'px)'; }
  wrap.onwheel = function(e){
    e.preventDefault();
    zoom = Math.min(5, Math.max(1, zoom - e.deltaY*0.003));
    if(zoom===1){tx=0;ty=0;}
    wrap.style.cursor = zoom>1 ? 'grab' : 'zoom-in';
    apply();
  };
  wrap.onmousedown = function(e){
    if(zoom<=1) return;
    dragging=true; sx=e.clientX; sy=e.clientY; stx=tx; sty=ty;
    wrap.style.cursor='grabbing'; e.preventDefault();
  };
  window._lbFeedMove = function(e){ if(!dragging)return; tx=stx+(e.clientX-sx)/zoom; ty=sty+(e.clientY-sy)/zoom; apply(); };
  window._lbFeedUp = function(){ if(dragging){dragging=false; wrap.style.cursor=zoom>1?'grab':'zoom-in';} };
  document.addEventListener('mousemove', window._lbFeedMove);
  document.addEventListener('mouseup', window._lbFeedUp);
  // Touch
  let lastDist=0;
  wrap.ontouchstart=function(e){
    if(e.touches.length===2){ lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
    else if(e.touches.length===1&&zoom>1){ dragging=true; sx=e.touches[0].clientX; sy=e.touches[0].clientY; stx=tx; sty=ty; }
  };
  wrap.ontouchmove=function(e){
    e.preventDefault();
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      zoom=Math.min(5,Math.max(1,zoom*(d/lastDist))); lastDist=d;
      if(zoom===1){tx=0;ty=0;} apply();
    } else if(e.touches.length===1&&dragging){
      tx=stx+(e.touches[0].clientX-sx)/zoom; ty=sty+(e.touches[0].clientY-sy)/zoom; apply();
    }
  };
  wrap.ontouchend=function(e){ if(e.touches.length<2)lastDist=0; dragging=false; };
}
window.closeLb = function(){
  document.getElementById('lbOverlay').classList.remove('show');
  const img=document.getElementById('lbImg');
  const wrap=document.getElementById('lbWrap');
  if(img) img.style.transform='scale(1) translate(0,0)';
  if(wrap){ wrap.onwheel=null; wrap.onmousedown=null; wrap.style.cursor='zoom-in'; }
  if(window._lbFeedMove) document.removeEventListener('mousemove',window._lbFeedMove);
  if(window._lbFeedUp) document.removeEventListener('mouseup',window._lbFeedUp);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeLb(); });

// ══ TIERLIST VIEWER (FEED) ══
const FEED_TLV_CSS = `
  .tlv-overlay{position:fixed;inset:0;background:#0a0a0f;z-index:500;display:none;flex-direction:column;overflow-y:auto;font-family:"Space Mono",monospace}
  .tlv-overlay.show{display:flex}
  .tlv-topbar{position:sticky;top:0;background:rgba(10,10,15,.97);border-bottom:1px solid #252530;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:2;flex-shrink:0}
  .tlv-back{padding:6px 14px;border:1px solid #333;border-radius:7px;background:transparent;color:#aaa;font-size:10px;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:1px;transition:all .2s}
  .tlv-back:hover{border-color:#c8a96e;color:#c8a96e}
  .tlv-ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff}
  .tlv-content{padding:20px;max-width:900px;width:100%;margin:0 auto}
  .tlv-row{display:flex;align-items:stretch;margin-bottom:4px;border-radius:7px;overflow:hidden;min-height:76px}
  .tlv-label{width:76px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:clamp(12px,2.5vw,26px);color:#fff;flex-shrink:0;text-align:center;word-break:break-word;padding:4px;line-height:1.1}
  .tlv-items{flex:1;background:rgba(255,255,255,.04);display:flex;flex-wrap:wrap;gap:5px;padding:8px;align-content:flex-start;min-height:76px}
  .tlv-item{position:relative;width:64px;flex-shrink:0}
  .tlv-item img{width:64px;height:88px;object-fit:cover;border-radius:5px;display:block;background:#1a1a24}
  .tlv-item-lbl{font-size:7px;color:#bbb;text-align:center;margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:64px}
  .tlv-link-btn{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:rgba(200,169,110,.9);border:none;cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;color:#1a1005;font-weight:700;z-index:1;transition:transform .15s}
  .tlv-link-btn:hover{transform:scale(1.2)}
  .tlv-pool-title{font-size:9px;letter-spacing:2px;color:#5a5060;text-transform:uppercase;margin:14px 0 6px}
  .tlv-pool{display:flex;flex-wrap:wrap;gap:5px;background:rgba(255,255,255,.02);border:1px solid #252530;border-radius:8px;padding:10px;min-height:60px}
`;
let _feedTlvStyle = null;
function _ensureFeedTlvStyle(){
  if(!_feedTlvStyle){ _feedTlvStyle=document.createElement('style'); _feedTlvStyle.textContent=FEED_TLV_CSS; document.head.appendChild(_feedTlvStyle); }
}

window.openFeedTierlist = function(btn){
  _ensureFeedTlvStyle();
  let rv;
  try{ rv = JSON.parse(btn.dataset.rv.replace(/&#39;/g,"'").replace(/&quot;/g,'"')); }catch(ex){ console.error(ex); return; }
  if(!rv.tiersData){ alert('Данные тирлиста не сохранены — переопубликуй тирлист'); return; }
  let overlay = document.getElementById('feedTlvOverlay');
  if(!overlay){
    overlay = document.createElement('div'); overlay.id='feedTlvOverlay'; overlay.className='tlv-overlay';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = buildTlvHTML(rv);
  overlay.classList.add('show');
  overlay.scrollTop = 0;
  overlay.querySelector('.tlv-back').onclick = () => overlay.classList.remove('show');
  const escFn = e=>{ if(e.key==='Escape'){ overlay.classList.remove('show'); document.removeEventListener('keydown',escFn); }};
  document.addEventListener('keydown', escFn);
}

function buildTlvHTML(rv){
  const tiers = rv.tiersData||[];
  const pool = rv.poolData||[];
  const links = rv.reviewLinks||{};
  const meta = [rv.authorNick?'@'+rv.authorNick:'', rv.type||'', rv.date||''].filter(Boolean).join(' · ');
  let html = `<div class="tlv-topbar" style="display:flex;align-items:flex-start;gap:14px;padding:14px 24px">
    <button class="tlv-back" style="flex-shrink:0;margin-top:2px">← Назад</button>
    <div>
      <div class="tlv-ttl">${rv.title||'ТИРЛИСТ'}</div>
      ${meta?`<div style="font-size:10px;color:#5a5060;letter-spacing:1px;margin-top:3px">${meta}</div>`:''}
    </div>
  </div><div class="tlv-content">`;
  tiers.forEach(tier=>{
    html += `<div class="tlv-row"><div class="tlv-label" style="background:${tier.color}">${tier.label}</div><div class="tlv-items">`;
    if(!tier.items||!tier.items.length) html += '<div style="color:#333;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:8px">—</div>';
    else tier.items.forEach(item=>{
      const lnk = links[item.id];
      html += `<div class="tlv-item">${lnk?`<button class="tlv-link-btn" onclick="feedOpenReview('${lnk.reviewId}')" title="${lnk.reviewTitle||''}">🔗</button>`:''}
        <img src="${item.img}" alt="" loading="lazy" onerror="this.style.opacity='.2'">
        <div class="tlv-item-lbl">${item.label||''}</div></div>`;
    });
    html += '</div></div>';
  });
  if(pool.length){
    html += '<div class="tlv-pool-title">НЕ ОЦЕНЕНО</div><div class="tlv-pool">';
    pool.forEach(item=>{
      const lnk = links[item.id];
      html += `<div class="tlv-item">${lnk?`<button class="tlv-link-btn" onclick="feedOpenReview('${lnk.reviewId}')" title="${lnk.reviewTitle||''}">🔗</button>`:''}
        <img src="${item.img}" alt="" loading="lazy" onerror="this.style.opacity='.2'">
        <div class="tlv-item-lbl">${item.label||''}</div></div>`;
    });
    html += '</div>';
  }
  return html + '</div>';
}

window.feedOpenReview = async function(reviewId){
  // find in allPosts or load from firebase
  const post = allPosts.find(p=>p.id===reviewId);
  if(post){
    const overlay = document.getElementById('feedTlvOverlay');
    if(overlay) overlay.classList.remove('show');
    openLb(post.id);
    return;
  }
  // load from firebase
  try{
    const snap = await get(query(ref(db,'reviews'), orderByChild('id')));
    // walk all users
    const allRevs = snap.val()||{};
    let found = null;
    Object.values(allRevs).forEach(userRevs=>{ if(userRevs&&userRevs[reviewId]) found = userRevs[reviewId]; });
    if(found){
      // show in lightbox
      document.getElementById('feedTlvOverlay')?.classList.remove('show');
      // inject temp image
      const tmpId = 'tmp_'+reviewId;
      if(!document.getElementById('img_'+tmpId)){
        const img = document.createElement('img'); img.id='img_'+tmpId; img.src=found.imgData||''; img.style.display='none';
        document.body.appendChild(img);
      }
      openLb(tmpId);
    }
  }catch(e){ console.error(e); }
}


// ── HELPERS ──
function getTimeAgo(ts){
  if(!ts)return'';
  const d=Date.now()-ts, m=Math.floor(d/60000), h=Math.floor(d/3600000), dd=Math.floor(d/86400000);
  if(m<1)return'только что';
  if(m<60)return m+'м назад';
  if(h<24)return h+'ч назад';
  if(dd<7)return dd+'д назад';
  return new Date(ts).toLocaleDateString('ru-RU');
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.toast = function(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+(type||'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000);
}
