<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Mono',monospace;background:#0a0a0f;color:#e8e0d0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.scene{text-align:center;position:relative;z-index:1}
.big{font-family:'Bebas Neue',sans-serif;font-size:clamp(120px,25vw,220px);line-height:.85;letter-spacing:-4px;color:transparent;-webkit-text-stroke:1px rgba(200,169,110,.25);user-select:none;animation:flicker 4s infinite}
@keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:.4}97%{opacity:1}98%{opacity:.2}99%{opacity:1}}
.msg{font-size:clamp(11px,2vw,14px);letter-spacing:4px;color:#5a5060;text-transform:uppercase;margin:16px 0 32px}
.link{display:inline-block;padding:12px 32px;border:1px solid rgba(200,169,110,.4);border-radius:8px;color:#c8a96e;font-size:11px;font-weight:700;letter-spacing:2px;text-decoration:none;transition:all .2s}
.link:hover{background:rgba(200,169,110,.08);border-color:#c8a96e}
/* floating particles */
.p{position:fixed;border-radius:50%;pointer-events:none;animation:drift linear infinite}
@keyframes drift{from{transform:translateY(110vh) rotate(0deg)}to{transform:translateY(-10vh) rotate(360deg)}}
</style>
</head>
<body>
<div id="particles"></div>
<div class="scene">
  <div class="big">404</div>
  <div class="msg">Страница не найдена</div>
  <a href="index.html" class="link">← На главную</a>
</div>
<script>
const wrap=document.getElementById('particles');
for(let i=0;i<18;i++){
  const d=document.createElement('div');d.className='p';
  const s=Math.random()*4+2;
  d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-10px;background:rgba(200,169,110,${Math.random()*.15+.03});animation-duration:${Math.random()*12+8}s;animation-delay:-${Math.random()*15}s`;
  wrap.appendChild(d);
}
</script>
</body>
</html>
